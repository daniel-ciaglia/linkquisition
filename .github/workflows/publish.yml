name: CI

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CC: clang

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: ~/.apt-cache
          key: apt-${{ runner.os }}-gtk4-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: apt-${{ runner.os }}-gtk4-
      - name: Install build dependencies
        run: |
          mkdir -p ~/.apt-cache/partial
          sudo apt-get update -q
          sudo apt-get install -y -o dir::cache::archives="$HOME/.apt-cache" clang libgtk-4-dev libglib2.0-dev libgirepository1.0-dev
      - uses: anchore/sbom-action/download-syft@v0
      - name: Install Task
        uses: go-task/setup-task@v2
      - name: Run Tests
        run: task test

      - name: Package files for Linux
        run: task package:linux

      - uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          hooks: goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
